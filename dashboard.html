<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#C0E1D2;
    --bg-2:#A8C5BA;
    --surface:#F6F4E8;
    --card:#FFFDF8;
    --ink:#2C2416;
    --ink-soft:#7A6E62;
    --line:#2C2416;
    --violet:#7A9BAA;
    --magenta:#C00707;
    --orange:#C8B89A;
    --green:#A8C5BA;
    --cyan:#C0E1D2;
    --shadow:5px 5px 0 var(--ink);
    --shadow-sm:3px 3px 0 var(--ink);
    --blob1:rgba(220,155,155,0.18);
    --blob2:rgba(168,197,186,0.22);
}
  html,body{height:100%;}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 100% 0%, var(--blob1), transparent 55%),
      radial-gradient(110% 90% at 0% 100%, var(--blob2), transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Top bar ─────────────────────────────────────────── */
  .topbar{
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;border-bottom:2px solid var(--ink);
    background:var(--bg);flex:0 0 auto;z-index:50;
  }
  .brand{display:flex;align-items:baseline;gap:12px;min-width:0;}
  .brand .mark{
    font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.02em;
    background:var(--ink);color:var(--bg);padding:4px 11px 5px;border-radius:8px;white-space:nowrap;
    box-shadow:var(--shadow-sm);
  }
  .brand .ttl{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand .sub{font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .spacer{flex:1;}
  .controls{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  .btn{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;
    border:2px solid var(--ink);background:var(--card);color:var(--ink);
    padding:8px 15px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
    transition:transform .08s, box-shadow .08s;box-shadow:var(--shadow-sm);
  }
  .btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink);}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
  .btn.primary{background:var(--ink);color:var(--bg);}
  .btn .ic{font-size:15px;line-height:1;}

  /* ── Stage + board ───────────────────────────────────── */
  .stage{flex:1;position:relative;overflow:hidden;}
  .board{
    position:absolute;left:50%;top:50%;
    width:1600px;height:900px;transform-origin:center center;
    background:var(--surface);
    border:2px solid var(--ink);border-radius:18px;
    box-shadow:10px 10px 0 rgba(22,20,15,0.22);
    overflow:hidden;
  }
  /* clean board surface — snap-grid still active, just not drawn */

  /* ── Tiles ───────────────────────────────────────────── */
  .tile{
    position:absolute;background:var(--card);
    border:2px solid var(--ink);border-radius:14px;
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;
    transition:box-shadow .12s;
  }
  .tile.dragging,.tile.resizing{box-shadow:8px 8px 0 var(--ink);}
  body[data-mode="view"] .tile{box-shadow:var(--shadow-sm);}
  .tbar{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    gap:8px;padding:8px 11px;border-bottom:2px solid var(--ink);
    background:var(--card);cursor:grab;user-select:none;
  }
  body[data-mode="view"] .tbar{cursor:default;}
  .tbar.dragging{cursor:grabbing;}
  .tbar-l{display:flex;align-items:center;gap:8px;min-width:0;}
  .tdot{width:9px;height:9px;border-radius:50%;background:var(--orange);border:1.5px solid var(--ink);flex:0 0 auto;}
  .tile-kpi .tdot{background:var(--green);}
  .tile-insight .tdot{background:var(--violet);}
  .tname{font-weight:600;font-size:12.5px;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tbar-r{display:flex;align-items:center;gap:7px;flex:0 0 auto;}
  .ttool{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--ink-soft);background:rgba(22,20,15,0.06);padding:3px 7px;border-radius:5px;
  }
  .tx{
    width:20px;height:20px;border:1.5px solid var(--ink);background:var(--card);border-radius:6px;
    font-size:10px;line-height:1;cursor:pointer;color:var(--ink);display:none;align-items:center;justify-content:center;
  }
  .tx:hover{background:var(--magenta);color:#fff;}
  body[data-mode="edit"] .tx{display:flex;}
  .tbody{flex:1;position:relative;overflow:hidden;}
  .tile-plot .tbody{padding:6px 8px 4px;}
  .plot{width:100%;height:100%;}
  .tgrip{
    position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;display:none;z-index:5;
    background:linear-gradient(135deg, transparent 46%, var(--ink) 46%, var(--ink) 56%, transparent 56%, transparent 72%, var(--ink) 72%, var(--ink) 82%, transparent 82%);
  }
  body[data-mode="edit"] .tgrip{display:block;}

  /* ── KPI tile ────────────────────────────────────────── */
  .kpi-wrap{padding:13px 16px;height:100%;display:flex;flex-direction:column;justify-content:center;gap:5px;}
  .kpi-val{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;line-height:1;letter-spacing:-0.03em;color:var(--kc);display:flex;align-items:baseline;}
  .kpi-num{font-variant-numeric:tabular-nums;}
  .kpi-suf{font-size:21px;margin-left:3px;}
  .kpi-lbl{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.15;letter-spacing:-0.005em;}
  .kpi-sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-soft);line-height:1.4;}

  /* ── Map control ─────────────────────────────────────── */
  .map-ctrl{display:flex;align-items:center;gap:10px;padding:2px 4px 8px;}
  .map-ctrl-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--ink-soft);}
  .yr-range{flex:1;accent-color:var(--magenta);height:4px;cursor:pointer;}
  .yr-out{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--ink);background:var(--yellow,#FFD92E);background:var(--bg);border:1.5px solid var(--ink);padding:1px 8px;border-radius:6px;min-width:52px;text-align:center;}
  .map-avg{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);min-width:64px;text-align:right;}
  .map-plot{width:100%;height:calc(100% - 30px);}

  /* ── Rules (insight) ─────────────────────────────────── */
  .rules{display:flex;flex-direction:column;gap:8px;padding:10px 12px;height:100%;overflow:auto;}
  .rule{display:flex;gap:18px;align-items:center;}
  .rule-m{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;color:var(--rc);min-width:58px;flex:0 0 58px;text-align:left;letter-spacing:-0.02em;line-height:1;}
  .rule-t{font-size:12px;line-height:1.32;color:var(--ink);flex:1;}
  .rule-t b{font-weight:700;}

  /* ── Palette ─────────────────────────────────────────── */
  .palette{
    position:absolute;left:16px;top:16px;bottom:16px;width:264px;z-index:60;
    background:var(--card);border:2px solid var(--ink);border-radius:14px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;
    transform:translateX(-300px);opacity:0;pointer-events:none;transition:transform .22s cubic-bezier(.2,.8,.2,1), opacity .22s;
  }
  .palette.open{transform:translateX(0);opacity:1;pointer-events:auto;}
  .pal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:2px solid var(--ink);}
  .pal-head h3{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
  .pal-head .pal-sub{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .pal-x{border:1.5px solid var(--ink);background:var(--card);width:24px;height:24px;border-radius:7px;cursor:pointer;font-size:12px;}
  .pal-x:hover{background:var(--magenta);color:#fff;}
  #palette-list{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .pitem{
    display:flex;align-items:center;gap:11px;text-align:left;
    border:2px solid var(--ink);background:var(--card);border-radius:10px;padding:9px 11px;cursor:pointer;
    transition:transform .08s,box-shadow .08s;box-shadow:2px 2px 0 var(--ink);
  }
  .pitem:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink);background:#FFFCEC;}
  .pitem:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink);}
  .pi-ic{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--ink);flex:0 0 auto;background:var(--magenta);}
  .pi-plot{background:linear-gradient(135deg,var(--orange),var(--magenta));}
  .pi-kpi{background:var(--green);}
  .pi-insight{background:var(--violet);}
  .pi-tx{display:flex;flex-direction:column;flex:1;min-width:0;}
  .pi-n{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pi-t{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;}
  .pi-add{font-size:17px;font-weight:700;color:var(--ink);}

  /* ── Hint ─────────────────────────────────────────────── */
  .hint{
    position:absolute;right:18px;bottom:12px;z-index:40;
    font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(22,20,15,0.42);
  }
  body[data-mode="view"] .hint{display:none;}

  .tile,.btn,.pitem,.palette{animation:pop .35s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes pop{from{transform:scale(.97);}to{transform:scale(1);}}
  #modeBtn { display: none; }
  .ttool { display: none; }
</style>
</head>

  <script>/* ============================================================================
   CHARTS  —  visual registry for the dashboard board
   Each entry: { name, tool, kind, w, h, render(el, ctx) }
   `render` draws into the given element (already sized in board pixels).
   Plotly tiles always render at their board-pixel size; the whole board is
   CSS-scaled by board.js, so charts stay crisp and never need re-rendering on
   window resize — only on user resize of an individual tile.
   ============================================================================ */
(function () {
  const C = {
    ink: '#2C2416', inkSoft: '#7A6E62', hair: 'rgba(44,36,22,0.08)', hair2: 'rgba(44,36,22,0.16)',
    red: '#C00707', taupe: '#7A6E62', mint: '#E5EEE4', sage: '#A8C5BA',
    green: '#C0E1D2', tan: '#C8B89A', rose: '#DC9B9B',
  };
  const REGION = { South: '#C00707', Northeast: '#7A9BAA', Midwest: '#C8B89A', West: '#A8C5BA' };
  const SEQ = [[0, '#F6F4E8'], [0.3, '#E5EEE4'], [0.55, '#C0E1D2'], [0.75, '#A8B8B0'], [0.88, '#C8908A'], [1, '#B06060']];
  const INC = ['#B06060', '#C00707', '#C8B89A', '#E5EEE4', '#C0E1D2', '#7A9BAA'];
  const CAT = { 'Race/Ethnicity': '#C00707', 'Income': '#C8B89A', 'Age (years)': '#7A9BAA', 'Education': '#A8C5BA', 'Sex': '#C0E1D2' };
  const FONT = 'Space Grotesk, sans-serif';
  const MONO = "'JetBrains Mono', monospace";

  function baseLayout(extra) {
    return Object.assign({
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: C.ink, size: 13, family: FONT },
      margin: { r: 16, t: 14, l: 44, b: 36 },
      xaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, tickfont: { size: 11, color: C.inkSoft } },
      yaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, tickfont: { size: 11, color: C.inkSoft } },
      showlegend: false,
    }, extra || {});
  }
  const CFG = { displayModeBar: false, responsive: false };
  function size(el) { return { width: el.clientWidth, height: el.clientHeight }; }

  // ── KPI big number + plain-language description ──────────────────────────────
  function kpi(el, { value, suffix, label, sub, color, mono }) {
    el.innerHTML = `<div class="kpi-wrap" style="--kc:${color}">
        <div class="kpi-val"><span class="kpi-num">0</span><span class="kpi-suf">${suffix || ''}</span></div>
        <div class="kpi-lbl">${label}</div>
        <div class="kpi-sub">${sub || ''}</div>
      </div>`;
    const numEl = el.querySelector('.kpi-num');
    const dec = (mono || 0);
    let t0 = null; const dur = 950;
    function step(t) {
      if (!t0) t0 = t;
      const p = Math.min(1, (t - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      numEl.textContent = (value * e).toFixed(dec);
      if (p < 1) requestAnimationFrame(step);
      else numEl.textContent = value.toFixed(dec);
    }
    requestAnimationFrame(step);
  }

  // ── Map (choropleth) with embedded year control ───────────────────────────────
  function renderMap(el, ctx) {
    el.innerHTML = `<div class="map-ctrl">
        <span class="map-ctrl-lbl">YEAR</span>
        <input type="range" class="yr-range" min="2011" max="2024" step="1" value="${ctx.year}">
        <span class="yr-out">${ctx.year}</span>
        <span class="map-avg"></span>
      </div><div class="map-plot"></div>`;
    const plot = el.querySelector('.map-plot');
    const out = el.querySelector('.yr-out');
    const avg = el.querySelector('.map-avg');
    function draw(year) {
      const d = DATA.map.filter(r => r.YearStart === year);
      const trace = {
        type: 'choropleth', locationmode: 'USA-states',
        locations: d.map(r => r.LocationAbbr), z: d.map(r => r.obesity_rate),
        zmin: 22, zmax: 42, colorscale: SEQ,
        marker: { line: { color: '#FFFDF5', width: 1 } },
        colorbar: { title: { text: '', font: { color: C.inkSoft, size: 10 } }, tickformat: '.0f', len: 0.78, thickness: 12, x: 0.97, tickfont: { color: C.inkSoft, size: 10, family: MONO } },
        hovertemplate: '<b>%{hovertext}</b><br>Obesity %{z:.1f}%<extra></extra>',
        hovertext: d.map(r => r.LocationDesc),
      };
      const labels = {
        type: 'scattergeo', locationmode: 'USA-states', mode: 'text',
        locations: d.map(r => r.LocationAbbr), text: d.map(r => r.LocationAbbr),
        textfont: { family: MONO, size: 9.5, color: d.map(r => r.obesity_rate >= 35 ? '#FFF7E8' : '#3A2A10') },
        hoverinfo: 'skip', showlegend: false,
      };
      const layout = baseLayout({
        margin: { r: 0, t: 0, l: 0, b: 0 },
        geo: { scope: 'usa', projection: { type: 'albers usa' }, showlakes: false, coastlinecolor: 'rgba(0,0,0,0)', landcolor: '#FFFDF5', bgcolor: 'rgba(0,0,0,0)', showframe: false, subunitcolor: '#FFFDF5' },
      });
      layout.width = plot.clientWidth; layout.height = plot.clientHeight;
      Plotly.react(plot, [trace, labels], layout, CFG);
      const a = (d.reduce((s, r) => s + r.obesity_rate, 0) / d.length).toFixed(1);
      avg.textContent = `avg ${a}%`;
      updateKPIsForYear(year);
    }
    const r = el.querySelector('.yr-range');
    r.addEventListener('input', () => { ctx.year = +r.value; out.textContent = r.value; draw(ctx.year); updateKPIsForYear(ctx.year); });
    requestAnimationFrame(() => draw(ctx.year));
  }

  // ── Trends over time ──────────────────────────────────────────────────────────
  function renderTrend(el,ctx) {
    const traces = [];
    for (const [region, color] of Object.entries(REGION)) {
      const pts = DATA.trend.regional.filter(r => r.region === region);
      traces.push({ x: pts.map(p => p.YearStart), y: pts.map(p => p.obesity_rate), type: 'scatter', mode: 'lines', name: region, line: { width: 3, color, shape: 'spline' }, hovertemplate: `${region} %{y:.1f}%<extra></extra>` });
    }
    const nat = DATA.trend.national;
    traces.push({ x: nat.map(p => p.YearStart), y: nat.map(p => p.obesity_rate), type: 'scatter', mode: 'lines', name: 'US avg', line: { width: 2, color: C.ink, dash: 'dot' }, hovertemplate: 'US avg %{y:.1f}%<extra></extra>' });
    const layout = baseLayout({
    xaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, dtick: 3, tickfont: { size: 11, color: C.inkSoft } },
    yaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, ticksuffix: '%', tickfont: { size: 11, color: C.inkSoft } },
    hovermode: 'x unified', hoverlabel: {
    bgcolor: '#FFFDF5',
    bordercolor: '#2C2416',
    font: { family: "'JetBrains Mono', monospace", size: 11, color: '#2C2416' },
    namelength: -1
  },
    shapes: [{
    type: 'line', x0: ctx.year, x1: ctx.year,
    y0: 0, y1: 1, yref: 'paper',
    line: { color: '#2C2416', dash: 'dot', width: 2 }
  }]
});Object.assign(layout, size(el));
    Plotly.newPlot(el, traces, layout, CFG);
    el._updateYear = (yr) => Plotly.relayout(el, {
    'shapes[0].x0': yr, 'shapes[0].x1': yr
});
  }

  // ── Scatter: activity vs obesity ─────────────────────────────────────────────
  function renderScatter(el) {
    const traces = [];
    for (const [region, color] of Object.entries(REGION)) {
      const pts = DATA.scatter.points.filter(p => p.region === region);
      traces.push({ x: pts.map(p => p.active), y: pts.map(p => p.obesity_rate), type: 'scatter', mode: 'markers', name: region, marker: { size: 10, color, opacity: 0.9, line: { width: 1, color: '#FFFDF5' } }, hovertemplate: '<b>%{hovertext}</b><br>active %{x:.1f}% · obesity %{y:.1f}%<extra></extra>', hovertext: pts.map(p => p.LocationAbbr) });
    }
    traces.push({ x: DATA.scatter.trend_x, y: DATA.scatter.trend_y, type: 'scatter', mode: 'lines', line: { width: 2, color: C.ink, dash: 'dash' }, hoverinfo: 'skip' });
    const layout = baseLayout({ xaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, ticksuffix: '%', title: { text: 'Physically active', font: { size: 11, color: C.inkSoft } }, tickfont: { size: 11, color: C.inkSoft } }, yaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, ticksuffix: '%', tickfont: { size: 11, color: C.inkSoft } }, annotations: [{ x: 1, y: 1, xref: 'paper', yref: 'paper', text: `r = ${DATA.scatter.r}`, showarrow: false, font: { family: MONO, size: 12, color: C.ink }, bgcolor: '#E5EEE4', borderpad: 4, xanchor: 'right', yanchor: 'top' }] });
    Object.assign(layout, size(el));
    Plotly.newPlot(el, traces, layout, CFG);
  }

  // ── Income–obesity gap ribbon ────────────────────────────────────────────────
function renderGap(el) {
  const x = DATA.gap.map(d => d.YearStart);
  const lo = DATA.gap.map(d => d.low_15k), hi = DATA.gap.map(d => d.high_75k);
  const mid = DATA.gap.map(d => (d.low_15k + d.high_75k) / 2);
  const traces = [
    { x: [...x, ...[...x].reverse()], y: [...lo, ...[...mid].reverse()],
      fill: 'toself', fillcolor: hexToRgba(C.red, 0.13),
      line: { width: 0 }, hoverinfo: 'skip' },
    { x: [...x, ...[...x].reverse()], y: [...mid, ...[...hi].reverse()],
      fill: 'toself', fillcolor: hexToRgba(C.green, 0.13),
      line: { width: 0 }, hoverinfo: 'skip' },
    { x, y: lo, type: 'scatter', mode: 'lines', name: 'Low (<$25k)',
      line: { width: 3.5, color: C.red },
      hovertemplate: 'Low <$25k: %{y:.1f}%<extra></extra>' },
    { x, y: mid, type: 'scatter', mode: 'lines', name: 'Medium ($25–75k)',
      line: { width: 2.5, color: C.tan, dash: 'dot' },
      hovertemplate: 'Medium $25–75k: %{y:.1f}%<extra></extra>' },
    { x, y: hi, type: 'scatter', mode: 'lines', name: 'High ($75k+)',
      line: { width: 3.5, color: C.taupe },
      hovertemplate: 'High $75k+: %{y:.1f}%<extra></extra>' },
  ];
  const layout = baseLayout({
    xaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, dtick: 3,
             tickfont: { size: 11, color: C.inkSoft } },
    yaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, ticksuffix: '%',
             tickfont: { size: 11, color: C.inkSoft } },
    hovermode: 'x unified',
    showlegend: false,
    hoverlabel: { bgcolor: '#FFFDF5', bordercolor: C.ink,
                  font: { family: MONO, size: 11, color: C.ink },
                  namelength: -1 },
  });
  Object.assign(layout, size(el));
  Plotly.newPlot(el, traces, layout, CFG);
}

  // ── Correlation heatmap ──────────────────────────────────────────────────────
  function renderCorr(el) {
    const trace = { type: 'heatmap', z: DATA.corr.z, x: DATA.corr.x, y: DATA.corr.y, colorscale: [[0, '#7A9BAA'], [0.5, '#F6F4E8'], [1, '#C00707']], zmin: -1, zmax: 1, xgap: 3, ygap: 3, text: DATA.corr.z.map(r => r.map(v => v.toFixed(2))), texttemplate: '%{text}', textfont: { size: 13, family: MONO, color: C.ink }, showscale: false, hovertemplate: '%{y} ↔ %{x}<br>r = %{z:.2f}<extra></extra>' };
    const layout = baseLayout({ margin: { r: 8, t: 8, l: 78, b: 70 }, xaxis: { side: 'bottom', tickangle: -35, tickfont: { size: 10, color: C.inkSoft } }, yaxis: { autorange: 'reversed', tickfont: { size: 10, color: C.inkSoft } } });
    Object.assign(layout, size(el));
    Plotly.newPlot(el, [trace], layout, CFG);
  }

  // ── Horizontal distribution bars ─────────────────────────────────────────────
  function distBar(el, data, order, labels, colors) {
    const keys = order || Object.keys(data);
    const means = keys.map(k => { const g = data[k] || [0]; return +(g.reduce((s, v) => s + v, 0) / g.length).toFixed(1); });
    const trace = { type: 'bar', orientation: 'h', x: means, y: labels, marker: { color: colors.slice(0, labels.length), line: { width: 0 } }, text: means.map(v => v + '%'), textposition: 'outside', textfont: { size: 12, family: MONO, color: C.ink }, cliponaxis: false, hovertemplate: '%{y}: %{x}%<extra></extra>' };
    const layout = baseLayout({ margin: { r: 46, t: 8, l: 8, b: 28 }, bargap: 0.32, xaxis: { gridcolor: C.hair, linecolor: 'rgba(0,0,0,0)', zeroline: false, ticksuffix: '%', tickfont: { size: 10, color: C.inkSoft } }, yaxis: { automargin: true, tickfont: { size: 11, color: C.ink } } });
    Object.assign(layout, size(el));
    Plotly.newPlot(el, [trace], layout, CFG);
  }
  function renderIncome(el) { const k = Object.keys(DATA.distIncome).sort(); const labels = k.map(x => { const m = {'Less than $15,000':'<$15k','$15,000 - $24,999':'$15–25k','$25,000 - $34,999':'$25–35k','$35,000 - $49,999':'$35–50k','$50,000 - $74,999':'$50–75k','$75,000 or greater':'$75k+'}; return m[x]||x; }); distBar(el, DATA.distIncome, k, labels, INC); }
  function renderEdu(el) { const k = Object.keys(DATA.distEdu).sort(); const labels = k.map(x => x.length > 24 ? x.slice(0,22)+'…' : x); distBar(el, DATA.distEdu, k, labels, [C.red, C.tan, C.mint, C.green]); }
  function renderRace(el) { const k = Object.keys(DATA.distRace).sort(); const labels = k.map(x => x.length > 20 ? x.slice(0,18)+'…' : x); distBar(el, DATA.distRace, k, labels, [C.red, C.taupe, C.tan, C.sage, C.green, '#FF6A1A', '#00BDB4', '#6A2BFF']); }

  // ── Most at-risk groups ──────────────────────────────────────────────────────
  function renderAtRisk(el) {
    const data = DATA.atrisk.slice(0, 10).slice().reverse();
    const trace = { type: 'bar', orientation: 'h', x: data.map(d => d.mean), y: data.map(d => d.Stratification1), marker: { color: data.map(d => CAT[d.StratificationCategory1] || '#999'), line: { width: 0 } }, text: data.map(d => d.mean + '%'), textposition: 'outside', textfont: { size: 11, family: MONO, color: C.ink }, cliponaxis: false, hovertemplate: '%{y}: %{x}%<extra></extra>' };
    const layout = baseLayout({ margin: { r: 44, t: 8, l: 8, b: 28 }, bargap: 0.3, xaxis: { gridcolor: C.hair, linecolor: 'rgba(0,0,0,0)', zeroline: false, range: [0, 46], ticksuffix: '%', tickfont: { size: 10, color: C.inkSoft } }, yaxis: { automargin: true, tickfont: { size: 10.5, color: C.ink } } });
   Object.assign(layout, size(el));
    Plotly.newPlot(el, [trace], layout, CFG);
  }

  // ── Association rules (insight tile) ─────────────────────────────────────────
  function renderRules(el) {
    const rules = [
      { m: '2.0×', t: 'Low-income people are more likely to be <b>both inactive and obese</b>.', c: C.red },
      { m: '98%', t: 'Obese + low-income individuals are also <b>physically inactive</b>.', c: C.tan },
      { m: '94%', t: 'Low-income show above-median inactivity — <b>1.9× random</b>.', c: C.taupe },
      { m: '70%', t: 'Inactive + low-income are also obese — <b>1.4× baseline</b>.', c: C.green },
    ];
    el.innerHTML = `<div class="rules">${rules.map(r => `
      <div class="rule">
        <div class="rule-m" style="--rc:${r.c}">${r.m}</div>
        <div class="rule-t">${r.t}</div>
      </div>`).join('')}</div>`;
  }

  // ── Box plot: obesity spread by region (distribution comparison) ─────────────
  function hexToRgba(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }
  function renderBox(el) {
    const regions = ['South', 'Northeast', 'Midwest', 'West'];
    const latest = DATA.map.filter(m => m.YearStart === 2024);
    const traces = regions.map(r => ({
      type: 'box', name: r,
      y: latest.filter(m => m.region === r).map(m => m.obesity_rate),
      boxpoints: 'all', jitter: 0.45, pointpos: 0, whiskerwidth: 0.6,
      marker: { color: REGION[r], size: 5, opacity: 0.6, line: { width: 0.5, color: '#FFFDF5' } },
      line: { color: C.ink, width: 1.5 }, fillcolor: hexToRgba(REGION[r], 0.45),
      hovertemplate: `${r}<br>%{y:.1f}%<extra></extra>`,
    }));
    const layout = baseLayout({
      margin: { r: 14, t: 10, l: 40, b: 30 }, boxgap: 0.4,
      xaxis: { gridcolor: 'rgba(0,0,0,0)', linecolor: C.hair2, zeroline: false, tickfont: { size: 11, color: C.ink } },
      yaxis: { gridcolor: C.hair, linecolor: C.hair2, zeroline: false, ticksuffix: '%', tickfont: { size: 11, color: C.inkSoft } },
    });
    Object.assign(layout, size(el));
    Plotly.newPlot(el, traces, layout, CFG);
  }

  // Real-data KPI cards (computed once on init)
  function getKPIs() {
    const d2024 = DATA.map.filter(r => r.YearStart === 2024);
    const avg = +(d2024.reduce((s,r) => s + r.obesity_rate, 0) / d2024.length).toFixed(1);
    const sorted = [...d2024].sort((a,b) => b.obesity_rate - a.obesity_rate);
    const hi = sorted[0], lo = sorted[sorted.length-1];
    const lowGrp = DATA.gap[DATA.gap.length-1].low_15k;
    const hiGrp = DATA.gap[DATA.gap.length-1].high_75k;
    const gapVal = +(lowGrp - hiGrp).toFixed(1);
    const d2011 = DATA.map.filter(r => r.YearStart === 2011);
    const avg11 = +(d2011.reduce((s,r) => s + r.obesity_rate, 0) / d2011.length).toFixed(1);
    const delta = +(avg - avg11).toFixed(1);
    return { avg, hi, lo, gapVal, delta };
  }


  window.CHARTS = {
    'kpi-avg': { name: 'National Average', tool: 'KPI', kind: 'kpi', w: 380, h: 150 },
    'kpi-high': { name: 'Highest State', tool: 'KPI', kind: 'kpi', w: 380, h: 150 },
    'kpi-low': { name: 'Lowest State', tool: 'KPI', kind: 'kpi', w: 380, h: 150 },
    'kpi-gap': { name: 'Income Gap', tool: 'KPI', kind: 'kpi', w: 380, h: 150 },
    'map': { name: 'Geographic Distribution', tool: 'Choropleth', kind: 'plot', w: 772, h: 456, desc: 'Drag slider to change year', render: renderMap },
   'trend': { name: 'Trends Over Time', tool: 'Line', kind: 'plot', w: 780, h: 220, desc: 'Regional obesity 2011–2024', render: (el, ctx) => renderTrend(el, ctx) },'scatter': { name: 'Activity vs Obesity', tool: 'Scatter', kind: 'plot', w: 780, h: 220, desc: 'State-level PA vs obesity', render: renderScatter },
    'gap': { name: 'Income–Obesity Gap', tool: 'Area', kind: 'plot', w: 512, h: 268, desc: 'Low vs high income gap', render: renderGap },
    'corr': { name: 'Health Correlations', tool: 'Heatmap', kind: 'plot', w: 400, h: 268, desc: '5-metric Pearson matrix', render: renderCorr },
    'atrisk': { name: 'Most At-Risk Groups', tool: 'Bar', kind: 'plot', w: 300, h: 268, desc: 'Ranked by mean obesity', render: renderAtRisk },
    'rules': { name: 'Association Rules', tool: 'Apriori', kind: 'insight', w: 308, h: 268, desc: 'Income → inactivity & obesity', render: renderRules },
    'income': { name: 'Obesity by Income', tool: 'Bar', kind: 'plot', w: 420, h: 260, desc: '2024', render: renderIncome },
    'edu': { name: 'Obesity by Education', tool: 'Bar', kind: 'plot', w: 420, h: 260, desc: '2024', render: renderEdu },
    'race': { name: 'Obesity by Race/Ethnicity', tool: 'Bar', kind: 'plot', w: 420, h: 260, desc: '2024', render: renderRace },
    'box': { name: 'Obesity Spread by Region', tool: 'Box plot', kind: 'plot', w: 440, h: 268, desc: 'State-level variance', render: renderBox },
  };
  
  function updateKPIsForYear(year) {
    const d = DATA.map.filter(r => r.YearStart === year);
    if (!d.length) return;
    const avg = +(d.reduce((s, r) => s + r.obesity_rate, 0) / d.length).toFixed(1);
    const sorted = [...d].sort((a, b) => b.obesity_rate - a.obesity_rate);
    const hi = sorted[0], lo = sorted[sorted.length - 1];
    const gapRow = DATA.gap.find(g => g.YearStart === year) || DATA.gap[DATA.gap.length - 1];
    const gapVal = +(gapRow.low_15k - gapRow.high_75k).toFixed(1);
    const d2011 = DATA.map.filter(r => r.YearStart === 2011);
    const avg11 = +(d2011.reduce((s, r) => s + r.obesity_rate, 0) / d2011.length).toFixed(1);
    const delta = +(avg - avg11).toFixed(1);
    const deltaStr = delta > 0 ? `+${delta}` : `${delta}`;
    const tileAvg  = document.querySelector('[data-kpi="kpi-avg"]');
    const tileHigh = document.querySelector('[data-kpi="kpi-high"]');
    const tileLow  = document.querySelector('[data-kpi="kpi-low"]');
    const tileGap  = document.querySelector('[data-kpi="kpi-gap"]');
    if (tileAvg)  { const b = tileAvg.querySelector('.tbody');  if (b) kpi(b, { value: avg,             suffix: '%',   label: 'Share of adults with obesity', sub: `U.S. average · ${year} · ${deltaStr} pts since 2011`, color: C.red, mono: 1 }); }
    if (tileHigh) { const b = tileHigh.querySelector('.tbody'); if (b) kpi(b, { value: hi.obesity_rate, suffix: '%',   label: 'Most obese state',   sub: `${hi.LocationDesc} — ${hi.obesity_rate}% (${year})`,  color: C.tan,  mono: 1 }); }
    if (tileLow)  { const b = tileLow.querySelector('.tbody');  if (b) kpi(b, { value: lo.obesity_rate, suffix: '%',   label: 'Least obese state',  sub: `${lo.LocationDesc} — ${lo.obesity_rate}% (${year})`,  color: C.green,   mono: 1 }); }
    if (tileGap)  { const b = tileGap.querySelector('.tbody');  if (b) kpi(b, { value: gapVal,          suffix: 'pts', label: 'Obesity gap by income', sub: `Adults earning <$15k vs. $75k+ per year`,           color: C.taupe,  mono: 1 }); }
    document.querySelectorAll('.plot').forEach(p => {
    if (p._updateYear) p._updateYear(year);
});
  }

  function setupKPIs() {
    const k = getKPIs();
    CHARTS['kpi-avg'].render  = (el) => kpi(el, { value: k.avg,             suffix: '%',   label: 'Share of adults with obesity', sub: `U.S. average · 2024 · up ${k.delta > 0 ? '+' + k.delta : k.delta} pts since 2011`, color: C.red, mono: 1 });
    CHARTS['kpi-high'].render = (el) => kpi(el, { value: k.hi.obesity_rate, suffix: '%',   label: 'Most obese state',   sub: `${k.hi.LocationDesc} — ${k.hi.obesity_rate}% (2024)`, color: C.tan, mono: 1 });
    CHARTS['kpi-low'].render  = (el) => kpi(el, { value: k.lo.obesity_rate, suffix: '%',   label: 'Least obese state',  sub: `${k.lo.LocationDesc} — ${k.lo.obesity_rate}% (2024)`, color: C.green,  mono: 1 });
    CHARTS['kpi-gap'].render  = (el) => kpi(el, { value: k.gapVal,          suffix: 'pts', label: 'Obesity gap by income', sub: `Adults earning <$15k vs. $75k+ per year`,           color: C.taupe, mono: 1 });
  }

  // Call once to set real KPI values
  setupKPIs();

  // Re-run KPIs after any chart rebuild (palette change, etc.)
  window.__rerenderKPIs = setupKPIs;
})();
</script>
  <script>/* ============================================================================
   BOARD  —  Power-BI-style canvas engine
   Fixed 1600×900 board scaled to fit the stage. Tiles are free-positioned,
   draggable, resizable, addable from the palette, removable, and persisted.
   ============================================================================ */
(function () {
  const BOARD_W = 1600, BOARD_H = 900, GRID = 8, MIN_W = 168, MIN_H = 96;
  const KEY = 'obesity-board-v4';

  const DEFAULT = [
    { type: 'kpi-avg', x: 24, y: 24, w: 372, h: 150 },
    { type: 'kpi-high', x: 412, y: 24, w: 372, h: 150 },
    { type: 'kpi-low', x: 800, y: 24, w: 372, h: 150 },
    { type: 'kpi-gap', x: 1188, y: 24, w: 388, h: 150 },
    { type: 'map', x: 24, y: 190, w: 760, h: 424 },
    { type: 'trend', x: 800, y: 190, w: 776, h: 203 },
    { type: 'scatter', x: 800, y: 405, w: 776, h: 209 },
    { type: 'gap', x: 24, y: 630, w: 500, h: 246 },
    { type: 'corr', x: 540, y: 630, w: 392, h: 246 },
    { type: 'atrisk', x: 948, y: 630, w: 300, h: 246 },
    { type: 'rules', x: 1264, y: 630, w: 312, h: 246 },
  ];

  let tiles = [];
  let ctx = { year: 2024 };
  let mode = 'edit';
  let uid = 1;
  let addCascade = 0;

  const board = document.getElementById('board');
  const stage = document.getElementById('stage');

  // ── persistence ──────────────────────────────────────────────────────────────
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify({ tiles, year: ctx.year, mode })); } catch (e) {}
  }
  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && Array.isArray(s.tiles) && s.tiles.length) {
        tiles = s.tiles.map(t => ({ ...t, id: 't' + (uid++) }));
        ctx.year = s.year || 2024; mode = s.mode || 'edit'; return true;
      }
    } catch (e) {}
    return false;
  }

  function snap(v) { return Math.round(v / GRID) * GRID; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  // ── scaling ──────────────────────────────────────────────────────────────────
  let scale = 1;
  function fit() {
    const pad = 0;
    const sw = stage.clientWidth - pad, sh = stage.clientHeight - pad;
    scale = Math.min(sw / BOARD_W, sh / BOARD_H);
    board.style.transform = `translate(-50%,-50%) scale(${scale})`;
  }

  // ── tile rendering ─────────────────────────────────────────────────────────────
  function makeTile(t) {
    const meta = CHARTS[t.type];
    if (!meta) return;
    const el = document.createElement('div');
    el.className = 'tile tile-' + meta.kind;
    el.dataset.id = t.id;
    if (t.type.startsWith('kpi-')) { el.dataset.kpi = t.type; }
    el.style.left = t.x + 'px'; el.style.top = t.y + 'px';
    el.style.width = t.w + 'px'; el.style.height = t.h + 'px';
    el.innerHTML = `
      <div class="tbar">
        <div class="tbar-l"><span class="tname">${meta.name}</span></div>
        <div class="tbar-r"><span class="ttool">${meta.tool}</span><button class="tx" title="Remove">✕</button></div>
      </div>
      <div class="tbody">${meta.desc ? `<span class="tdesc">${meta.desc}</span>` : ''}</div>
      <div class="tgrip"></div>`;
    board.appendChild(el);
    const body = el.querySelector('.tbody');
    t._el = el; t._body = body;
    renderBody(t);
    // remove
    el.querySelector('.tx').addEventListener('click', (e) => { e.stopPropagation(); removeTile(t.id); });
    // drag (whole tile via top bar)
    enableDrag(t, el.querySelector('.tbar'));
    // resize
    enableResize(t, el.querySelector('.tgrip'));
    // bring to front on press
    el.addEventListener('pointerdown', () => bringFront(el));
  }

  function renderBody(t) {
    const meta = CHARTS[t.type];
    t._body.innerHTML = '';
    if (meta.kind === 'plot') {
      const c = document.createElement('div');
      c.className = 'plot';
      t._body.appendChild(c);
      requestAnimationFrame(() => meta.render(c, ctx));
    } else {
      meta.render(t._body, ctx);
    }
  }

  let zTop = 10;
  function bringFront(el) { el.style.zIndex = (++zTop); }

  function removeTile(id) {
    const i = tiles.findIndex(t => t.id === id);
    if (i < 0) return;
    tiles[i]._el.remove();
    tiles.splice(i, 1);
    save();
  }

  function addTile(type) {
    const meta = CHARTS[type];
    const base = 40 + (addCascade % 6) * 28;
    addCascade++;
    const t = { id: 't' + (uid++), type, x: snap(base), y: snap(base + 60), w: meta.w, h: meta.h };
    t.x = clamp(t.x, 0, BOARD_W - t.w); t.y = clamp(t.y, 0, BOARD_H - t.h);
    tiles.push(t);
    makeTile(t);
    bringFront(t._el);
    save();
  }

  // ── drag ───────────────────────────────────────────────────────────────────────
  function enableDrag(t, handle) {
    handle.addEventListener('pointerdown', (e) => {
      if (mode !== 'edit') return;
      if (e.target.closest('.tx')) return;
      e.preventDefault();
      const sx = e.clientX, sy = e.clientY, ox = t.x, oy = t.y;
      t._el.classList.add('dragging');
      function move(ev) {
        const dx = (ev.clientX - sx) / scale, dy = (ev.clientY - sy) / scale;
        t.x = clamp(snap(ox + dx), 0, BOARD_W - t.w);
        t.y = clamp(snap(oy + dy), 0, BOARD_H - t.h);
        t._el.style.left = t.x + 'px'; t._el.style.top = t.y + 'px';
      }
      function up() {
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        t._el.classList.remove('dragging');
        save();
      }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    });
  }

  // ── resize ───────────────────────────────────────────────────────────────────
  function enableResize(t, grip) {
    grip.addEventListener('pointerdown', (e) => {
      if (mode !== 'edit') return;
      e.preventDefault(); e.stopPropagation();
      const sx = e.clientX, sy = e.clientY, ow = t.w, oh = t.h;
      t._el.classList.add('resizing');
      function move(ev) {
        const dx = (ev.clientX - sx) / scale, dy = (ev.clientY - sy) / scale;
        t.w = clamp(snap(ow + dx), MIN_W, BOARD_W - t.x);
        t.h = clamp(snap(oh + dy), MIN_H, BOARD_H - t.y);
        t._el.style.width = t.w + 'px'; t._el.style.height = t.h + 'px';
      }
      function up() {
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        t._el.classList.remove('resizing');
        renderBody(t); // re-render chart at new size
        save();
      }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    });
  }

  // ── modes ───────────────────────────────────────────────────────────────────
  function applyMode() {
    document.body.dataset.mode = mode;
    document.getElementById('modeBtn').textContent = mode === 'edit' ? 'View' : 'Edit';
    document.getElementById('modeBtn').dataset.next = mode === 'edit' ? 'view' : 'edit';
    if (mode === 'view') document.getElementById('palette').classList.remove('open');
  }
  function toggleMode() { mode = mode === 'edit' ? 'view' : 'edit'; applyMode(); save(); }

  function buildPalette() {
    const list = document.getElementById('palette-list');
    list.innerHTML = '';
    for (const [key, meta] of Object.entries(CHARTS)) {
      const b = document.createElement('button');
      b.className = 'pitem';
      b.innerHTML = `<span class="pi-ic pi-${meta.kind}"></span><span class="pi-tx"><span class="pi-n">${meta.name}</span><span class="pi-t">${meta.tool}</span></span><span class="pi-add">＋</span>`;
      b.addEventListener('click', () => addTile(key));
      list.appendChild(b);
    }
  }

  function render() {
    board.querySelectorAll('.tile').forEach(n => n.remove());
    tiles.forEach(makeTile);
  }
  window.__rerenderBoard = render;

  function init() {
    if (!load()) { tiles = DEFAULT.map(t => ({ ...t, id: 't' + (uid++) })); }
    buildPalette();
    render();
    applyMode();
    fit();
    window.addEventListener('resize', fit);

    document.getElementById('modeBtn').addEventListener('click', toggleMode);
    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('palette').classList.toggle('open');
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      tiles.forEach(t => t._el && t._el.remove());
      tiles = DEFAULT.map(t => ({ ...t, id: 't' + (uid++) }));
      ctx.year = 2024; addCascade = 0;
      render(); save();
    });
    document.getElementById('palClose').addEventListener('click', () => {
      document.getElementById('palette').classList.remove('open');
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
